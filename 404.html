<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Halaman Tidak Ditemukan — PIONERA GENERATION 2025</title>
<meta name="robots" content="noindex"/>
<link rel="icon" type="image/png" href="assets/logo.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#d4a843;--bg:#030c1a;--surf:#091726;--white:#e8f0fa;--muted:#7a95b0;--fd:'Playfair Display',serif;--fb:'Poppins',sans-serif}
html,body{height:100%;font-family:var(--fb);background:var(--bg);color:var(--white);overflow:hidden}
body{display:flex;align-items:center;justify-content:center;text-align:center;padding:1.5rem;position:relative}
body::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(212,168,67,.05),transparent 70%);
  pointer-events:none;
}
canvas{position:absolute;inset:0;pointer-events:none;opacity:.6}
.container{position:relative;z-index:1;max-width:480px}
.logo{width:72px;height:72px;object-fit:contain;margin:0 auto 1.5rem;filter:drop-shadow(0 0 28px rgba(212,168,67,.35));animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.code{font-family:var(--fd);font-size:clamp(5rem,18vw,8rem);font-weight:700;line-height:1;background:linear-gradient(135deg,#fff8e0,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}
.orn{display:flex;align-items:center;justify-content:center;gap:.75rem;margin:.75rem 0}
.orn-line{width:48px;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,67,.4))}
.orn-line.r{background:linear-gradient(90deg,rgba(212,168,67,.4),transparent)}
.orn-dot{width:4px;height:4px;background:var(--gold);transform:rotate(45deg)}
h1{font-family:var(--fd);font-size:clamp(1.3rem,4vw,1.8rem);color:var(--white);margin-bottom:.6rem}
p{font-size:.875rem;color:var(--muted);line-height:1.8;margin-bottom:2rem}
.links{display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap}
a.btn{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.65rem 1.4rem;border-radius:50px;font-size:.8rem;font-weight:500;
  text-decoration:none;transition:all .25s;
  -webkit-tap-highlight-color:transparent;
}
a.btn-p{background:linear-gradient(135deg,#f0c84a,#d4a843);color:#030c1a}
a.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,168,67,.35)}
a.btn-o{border:1px solid rgba(212,168,67,.25);color:var(--gold);background:rgba(212,168,67,.08)}
a.btn-o:hover{background:rgba(212,168,67,.15)}
a.btn svg{width:15px;height:15px;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="container">
  <img src="assets/logo.png" alt="Logo Pionera" class="logo" onerror="this.style.display='none'"/>
  <div class="code">404</div>
  <div class="orn">
    <div class="orn-line"></div><div class="orn-dot"></div><div class="orn-line r"></div>
  </div>
  <h1>Halaman Tidak Ditemukan</h1>
  <p>Halaman yang kamu cari tidak ada atau telah dipindahkan.<br>Kembali ke beranda dan temukan kenangan Pionera.</p>
  <div class="links">
    <a href="/Pionera/" class="btn btn-p">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Beranda
    </a>
    <a href="/Pionera/gallery.html" class="btn btn-o">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Galeri
    </a>
  </div>
</div>
<script>
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
let W,H,S=[];
const rz=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;S=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.15,a:Math.random(),v:Math.random()*.4+.05,d:Math.random()>.5?1:-1}))};
const dr=()=>{cx.clearRect(0,0,W,H);S.forEach(s=>{s.a+=s.v*.006*s.d;if(s.a>1||s.a<0)s.d*=-1;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(212,168,67,${s.a*.5})`;cx.fill()});requestAnimationFrame(dr)};
window.addEventListener('resize',rz,{passive:true});rz();dr();
</script>
</body>
</html>
